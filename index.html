<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakawin Speed Typing Challenge</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:#0a0a0f;color:#e4e4ef;min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:16px}
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:12px;transition:all .2s;font-size:14px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;padding:14px 24px;width:100%}
.btn-danger{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.3);padding:14px 24px;width:100%}
.input{background:rgba(255,255,255,.05);border:1px solid #2a2a3a;border-radius:12px;padding:14px;color:#fff;font-family:inherit;font-size:15px;width:100%;text-align:center;font-weight:600;outline:none}
.input:focus{border-color:rgba(245,158,11,.5)}
textarea.input{text-align:left;font-weight:400;resize:none;min-height:160px;font-size:14px;line-height:1.6}
.card{background:#1a1a28;border:1px solid #2a2a3a;border-radius:16px;overflow:hidden;margin-bottom:16px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700}
.bg-blue{background:rgba(96,165,250,.12);color:#60a5fa}
.bg-green{background:rgba(16,185,129,.12);color:#10b981}
.bg-amber{background:rgba(245,158,11,.15);color:#f59e0b}
.bar{height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;flex:1}
.bar-fill{height:100%;border-radius:99px;transition:width .5s}
.tab-bar{display:flex;gap:8px;margin-bottom:24px}
.tab{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;background:rgba(255,255,255,.04);color:#6b6b8a}
.tab.on{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
.home-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.menu-btn{width:100%;display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.025);border:1px solid #2a2a3a;border-radius:14px;padding:16px 20px;text-align:left;cursor:pointer;font-family:inherit;color:#e4e4ef;transition:all .2s}
.menu-btn:hover{transform:scale(1.02)}
.c-ok{color:#10b981}.c-err{color:#ef4444}.c-warn{color:#f59e0b}.c-mut{color:#6b6b8a}
.char-ok{color:#10b981}.char-err{color:#ef4444;background:rgba(239,68,68,.12)}.char-cur{color:#fff;background:rgba(245,158,11,.4)}.char-wait{color:rgba(255,255,255,.2)}
.fade{animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
</style>
</head>
<body>
<div id="app" class="container"></div>
<script>
// === FIREBASE ===
firebase.initializeApp({databaseURL:"https://go---phim---sakawin-default-rtdb.asia-southeast1.firebasedatabase.app"});
const db=firebase.database(),ref=db.ref("contest");
function fbSave(round,name,data){const k=name.replace(/[.#$\[\]\/]/g,"_");return ref.child(round).child(k).set({...data,name})}
function fbReset(){return ref.remove()}

// === DATA ===
const R1=[
{t:"Kịch bản chào hỏi & xin SĐT",x:"Dạ chào anh/chị ạ! Em là tư vấn viên bên Sakawin - chuyên bàn học thông minh chống gù chống cận cho bé ạ. Anh/chị đang tìm hiểu bàn học cho bé nhà mình đúng không ạ? Cho em hỏi bé nhà mình năm nay bao nhiêu tuổi và cao khoảng bao nhiêu để em tư vấn dòng phù hợp nhất ạ? Tiện em xin số điện thoại hoặc Zalo để em gửi catalogue ảnh thực tế các mẫu bàn cho anh/chị xem chi tiết hơn ạ, qua tin nhắn Facebook hình ảnh bị giảm chất lượng nhiều lắm ạ."},
{t:"Kịch bản báo giá & dồn ưu đãi",x:"Combo bàn S110 kết hợp ghế G18 hiện tại giá niêm yết là 5.590.000 đồng ạ. Tuy nhiên hiện tại bên em đang có chương trình ưu đãi đặc biệt qua Facebook, em xin duyệt giá combo cho anh/chị chỉ còn 4.790.000 đồng, tiết kiệm được 800.000 đồng ạ. Ngoài ra anh/chị còn được tặng kèm bộ quà trị giá 600.000 đồng gồm đèn học chống cận, giá đỡ sách và bọc ghế. Free ship toàn quốc và lắp đặt miễn phí tại nhà luôn ạ. Tổng giá trị ưu đãi lên đến 2.200.000 đồng, chỉ áp dụng khi mua qua Facebook thôi ạ."},
{t:"Kịch bản xử lý từ chối",x:"Em hiểu anh/chị cân nhắc về giá ạ. Nhưng mình thử tính thế này nhé: bàn bảo hành 10 năm, bé dùng từ bây giờ đến hết cấp 3 luôn ạ. Chia ra mỗi ngày chỉ khoảng 1.500 đồng thôi ạ, rẻ hơn một gói bim bim mà con mình có góc học tập chuẩn chống gù chống cận suốt cả quãng đời đi học. Nếu ngân sách hạn chế hơn, bên em còn có combo S110 kết hợp ghế G18 chỉ 4.790.000 đồng, vẫn đầy đủ tính năng chống gù và điều chỉnh chiều cao ạ. Em gửi anh/chị ảnh thực tế setup tại nhà khách hàng để anh/chị tham khảo nhé?"}
];
const R2=[
{t:"Tình huống 1",s:'Khách nhắn: "Cho mình hỏi bàn học cho bé 7 tuổi, cao 1m2 thì dùng loại nào? Giá bao nhiêu? Ship Đà Nẵng được không?"',c:"Chào hỏi đúng chuẩn, không báo giá ngay, hỏi thêm nhu cầu, xin SĐT, tư vấn dòng phù hợp, đề cập ship toàn quốc.",tl:180,mw:60},
{t:"Tình huống 2",s:'Khách nhắn: "Mình thấy trên Shopee có bàn tương tự mà rẻ hơn nhiều, sao bên bạn đắt thế?"',c:"Không nói xấu đối thủ, so sánh tổng giá trị ưu đãi FB (2.2-2.9 triệu), nêu USP bảo hành 10 năm + lắp đặt miễn phí.",tl:180,mw:60},
{t:"Tình huống 3",s:'Khách nhắn: "OK mình muốn mua combo bàn S110 + ghế G05. Địa chỉ: 45 Nguyễn Huệ, Quận 1, HCM. COD nhé."',c:"Xác nhận đầy đủ thông tin, upsell phụ kiện/ghế cao hơn, thông báo quy trình giao nội thành.",tl:150,mw:60}
];
const R3=[
{t:"Chung kết - TH1",s:'Khách nhắn: "Chồng mình bảo mua bàn gỗ bình thường được rồi, không cần bàn thông minh đâu. Đắt mà chưa chắc bé đã ngồi học."',c:"Thấu hiểu tâm lý gia đình, so sánh giá trị dài hạn, chia nhỏ giá/ngày, không push bán quá mức.",tl:200,mw:100},
{t:"Chung kết - TH2",s:'Khách nhắn: "Mình đang xem bên Igrow và Comfy, giá cũng tương đương. Sao mình nên chọn Sakawin?"',c:"Không nói xấu đối thủ, nêu USP riêng Sakawin, đề xuất gửi bảng so sánh, tạo urgency.",tl:200,mw:100},
{t:"Chung kết - TH3",s:'Khách nhắn: "Mình muốn mua nhưng tháng này hết tiền rồi. Tháng sau có còn giá này không?"',c:"Giữ chân khách, tạo urgency nhẹ, đề xuất đặt cọc giữ giá, xin SĐT follow-up.",tl:200,mw:100}
];

// === STATE ===
let S={v:"home",nm:"",rd:1,ti:0,si:0,r1s:[],done:false,tab:"round1",res:{round1:[],round2:[],round3:[]}};
let t1=null,t1s=null,t1i="",t1tl=300;
let tsc=null,scs=false,sci="",sctl=0;

ref.on("value",snap=>{
  const d=snap.val()||{};
  S.res={round1:d.round1?Object.values(d.round1):[],round2:d.round2?Object.values(d.round2):[],round3:d.round3?Object.values(d.round3):[]};
  draw();
});

const $=document.getElementById.bind(document),app=$("app");
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function el(tag,a,...ch){const e=document.createElement(tag);if(a)Object.entries(a).forEach(([k,v])=>{if(k==="class")e.className=v;else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="style"&&typeof v==="object")Object.assign(e.style,v);else if(k==="disabled"){if(v)e.disabled=true}else e.setAttribute(k,v)});ch.flat().forEach(c=>{if(c!=null)e.append(typeof c==="string"?document.createTextNode(c):c)});return e}
function go(v){S.v=v;draw()}

function draw(){
  app.innerHTML="";
  if(S.v==="home")drawHome();
  else if(S.v==="pname")drawPName();
  else if(S.v==="play")drawPlay();
  else if(S.v==="judge")drawJudge();
  else if(S.v==="review")drawReview();
  else if(S.v==="board")drawBoard();
  else if(S.v==="admin")drawAdmin();
}

function bk(){return el("button",{style:"background:none;border:none;color:#6b6b8a;font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:20px;padding:4px 0",onClick:()=>go("home")},"← Quay lại")}
function tabs(ks,ls){const b=el("div",{class:"tab-bar"});ks.forEach((k,i)=>b.append(el("button",{class:"tab"+(S.tab===k?" on":""),onClick:()=>{S.tab=k;draw()}},ls[i])));return b}

// === HOME ===
function drawHome(){
  const w=el("div",{class:"home-wrap"});
  w.innerHTML=`<div style="text-align:center;margin-bottom:48px"><div style="font-size:11px;letter-spacing:3px;color:rgba(245,158,11,.5);font-weight:700;margin-bottom:12px">SAKAWIN GLOBAL</div><div style="font-size:32px;font-weight:900;color:#fff">SPEED TYPING</div><div style="font-size:32px;font-weight:900;color:#f59e0b">CHALLENGE</div><div style="color:#6b6b8a;font-size:14px;margin-top:8px">Cuộc thi gõ phím nhanh & chuẩn xác</div></div>`;
  const m=el("div",{style:"width:100%;max-width:420px;display:flex;flex-direction:column;gap:12px"});
  [["pname","⌨️","THÍ SINH","Tham gia thi đấu"],["judge","📋","GIÁM KHẢO","Chấm điểm vòng 2 & 3"],["review","🔍","XEM LẠI BÀI THI","Đọc bài & phân tích"],["board","🏆","BẢNG XẾP HẠNG","Kết quả chung"],["admin","⚙️","BAN TỔ CHỨC","Quản lý cuộc thi"]].forEach(([v,ic,l,d])=>{
    m.append(el("button",{class:"menu-btn",onClick:()=>go(v)},el("span",{style:"font-size:24px"},ic),el("div",null,el("div",{style:"font-size:14px;font-weight:700"},l),el("div",{style:"font-size:12px;color:#6b6b8a"},d))));
  });
  w.append(m);app.append(w);
}

// === PLAYER NAME ===
function drawPName(){
  const w=el("div",{class:"home-wrap"});const inn=el("div",{style:"width:100%;max-width:420px"});
  inn.append(bk());
  inn.innerHTML+=`<div style="text-align:center;margin-bottom:32px"><div style="font-size:24px;margin-bottom:8px">⌨️</div><div style="font-size:20px;font-weight:900;color:#fff">Nhập tên thí sinh</div></div>`;
  inn.append(el("input",{class:"input",placeholder:"Họ tên...",value:S.nm,onInput:e=>S.nm=e.target.value}));
  const rs=el("div",{style:"margin:16px 0"});
  rs.innerHTML=`<div style="font-size:12px;color:#6b6b8a;text-align:center;margin-bottom:8px">Chọn vòng:</div>`;
  const rb=el("div",{style:"display:flex;gap:8px"});
  [1,2,3].forEach(r=>rb.append(el("button",{class:"tab"+(S.rd===r?" on":""),onClick:()=>{S.rd=r;draw()}},"Vòng "+r)));
  rs.append(rb);inn.append(rs);
  inn.append(el("button",{class:"btn btn-primary",disabled:!S.nm.trim(),onClick:()=>{S.ti=0;S.si=0;S.r1s=[];S.done=false;t1i="";t1s=null;t1tl=300;sci="";scs=false;sctl=0;go("play")}},"BẮT ĐẦU THI"));
  w.append(inn);app.append(w);
}

// === PLAYER ===
function drawPlay(){
  const w=el("div",{class:"fade"});
  const sc=S.rd===2?R2:R3;
  const cnt=S.rd===1?`${S.ti+1}/${R1.length}`:`TH ${S.si+1}/${sc.length}`;
  w.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px"><div><div style="font-size:11px;color:rgba(245,158,11,.5);font-weight:700;letter-spacing:1px">VÒNG ${S.rd}</div><div style="font-weight:900;color:#fff;font-size:16px">${esc(S.nm)}</div></div><div class="badge" style="background:rgba(255,255,255,.05);color:#6b6b8a">${cnt}</div></div>`;
  if(S.done){
    w.innerHTML+=`<div style="text-align:center;padding:60px 0"><div style="font-size:48px;margin-bottom:16px">🎉</div><div style="font-size:20px;font-weight:900;color:#fff;margin-bottom:8px">Hoàn thành vòng ${S.rd}!</div><div style="color:#6b6b8a;font-size:14px;margin-bottom:32px">Kết quả đã ghi nhận vào bảng xếp hạng</div></div>`;
    w.append(el("button",{class:"btn btn-primary",onClick:()=>go("home")},"VỀ TRANG CHỦ"));
  }else if(S.rd===1) drawR1(w);
  else drawSc(w);
  app.append(w);
}

// --- R1 ---
function drawR1(w){
  const txt=R1[S.ti].x;
  w.append(el("div",{style:"font-size:13px;font-weight:700;color:#6b6b8a;margin-bottom:12px"},R1[S.ti].t));
  const tc=t1tl<=30?"#ef4444":t1tl<=60?"#f59e0b":"#10b981";
  const tr=el("div",{style:"display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"});
  tr.append(el("span",{style:"font-family:monospace;font-weight:700;color:"+tc},"⏱ "+Math.floor(t1tl/60)+":"+String(t1tl%60).padStart(2,"0")));
  tr.append(el("span",{style:"color:#6b6b8a"},t1s?"Đang gõ...":"Gõ để bắt đầu"));
  w.append(tr);
  const pb=el("div",{class:"bar",style:"margin-bottom:12px;flex:none;width:100%"});
  pb.append(el("div",{class:"bar-fill",style:`width:${(t1tl/300)*100}%;background:${tc}`}));
  w.append(pb);
  const disp=el("div",{style:"background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;margin-bottom:12px;max-height:180px;overflow-y:auto;font-family:monospace;font-size:13px;line-height:1.8"});
  txt.split("").forEach((c,i)=>{const cls=i<t1i.length?(t1i[i]===c?"char-ok":"char-err"):i===t1i.length?"char-cur":"char-wait";disp.append(el("span",{class:cls},c))});
  w.append(disp);
  const ta=el("textarea",{class:"input",id:"r1i",value:t1i,placeholder:"Bắt đầu gõ tại đây...",style:"font-family:monospace;min-height:120px",onInput:e=>{t1i=e.target.value;if(!t1s){t1s=Date.now();startT1()}if(t1i.length>=txt.length)subR1();else draw()}});
  w.append(ta);
  const ft=el("div",{style:"display:flex;justify-content:space-between;align-items:center;margin-top:8px"});
  ft.append(el("span",{style:"font-size:12px;color:#6b6b8a"},`${t1i.length}/${txt.length} ký tự`));
  ft.append(el("button",{class:"btn btn-primary",disabled:!t1s||!t1i.trim(),style:"width:auto;padding:10px 24px",onClick:subR1},"NỘP BÀI"));
  w.append(ft);
  setTimeout(()=>{const e=document.getElementById("r1i");if(e){e.focus();e.setSelectionRange(e.value.length,e.value.length)}},50);
}
function startT1(){clearInterval(t1);t1=setInterval(()=>{t1tl--;if(t1tl<=0){clearInterval(t1);subR1()}else draw()},1000)}
function subR1(){
  clearInterval(t1);const txt=R1[S.ti].x;
  const el2=(Date.now()-t1s)/1000/60,ws=txt.split(/\s+/).length,r=Math.min(t1i.length/txt.length,1);
  const wpm=Math.round(Math.round(ws*r)/Math.max(el2,.01));
  let cor=0;for(let i=0;i<Math.min(t1i.length,txt.length);i++)if(t1i[i]===txt[i])cor++;
  const acc=Math.round(cor/txt.length*10000)/100,sc=Math.round(wpm*(acc/100));
  S.r1s.push({wpm,accuracy:acc,score:sc,timeSeconds:Math.round(el2*60)});
  if(S.ti<R1.length-1){S.ti++;t1i="";t1s=null;t1tl=300;draw()}
  else{const ns=S.r1s,aw=Math.round(ns.reduce((s,x)=>s+x.wpm,0)/ns.length),aa=Math.round(ns.reduce((s,x)=>s+x.accuracy,0)/ns.length*100)/100;
  fbSave("round1",S.nm,{wpm:aw,accuracy:aa,score:Math.round(aw*(aa/100)),timeSeconds:ns.reduce((s,x)=>s+x.timeSeconds,0)});
  t1i="";t1s=null;t1tl=300;S.done=true;draw()}
}

// --- Scenario ---
function drawSc(w){
  const scs2=S.rd===2?R2:R3,sc=scs2[S.si];
  if(!scs&&sctl===0)sctl=sc.tl;
  w.append(el("div",{style:"font-size:13px;font-weight:700;color:#6b6b8a;margin-bottom:12px"},sc.t));
  const sb=el("div",{style:"background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:12px;padding:14px;margin-bottom:12px"});
  sb.innerHTML=`<div style="font-size:10px;color:rgba(245,158,11,.5);font-weight:700;letter-spacing:.5px;margin-bottom:4px">TÌNH HUỐNG</div><div style="color:#fff;font-size:14px;line-height:1.6">${esc(sc.s)}</div>`;
  w.append(sb);
  const wc=sci.trim().split(/\s+/).filter(Boolean).length,mn=sc.mw,ok=wc>=mn;
  const tc=sctl<=30?"#ef4444":sctl<=60?"#f59e0b":"#10b981";
  const wcc=ok?"#10b981":wc>=mn*.7?"#f59e0b":"#ef4444";
  const tr=el("div",{style:"display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"});
  tr.append(el("span",{style:"font-family:monospace;font-weight:700;color:"+tc},"⏱ "+Math.floor(sctl/60)+":"+String(sctl%60).padStart(2,"0")));
  tr.append(el("span",{style:"font-family:monospace;font-weight:700;color:"+wcc},"✏️ "+wc+"/"+mn+" từ "+(ok?"✓":"")));
  w.append(tr);
  const bs=el("div",{style:"display:flex;gap:4px;margin-bottom:12px"});
  [[sctl/sc.tl*100,tc],[Math.min(wc/mn*100,100),wcc]].forEach(([pw,pc])=>{const b=el("div",{class:"bar"});b.append(el("div",{class:"bar-fill",style:`width:${pw}%;background:${pc}`}));bs.append(b)});
  w.append(bs);
  const ta=el("textarea",{class:"input",id:"sci",value:sci,placeholder:"Gõ câu trả lời tư vấn cho khách...",style:scs&&!ok?"border-color:rgba(239,68,68,.3)":"",onInput:e=>{sci=e.target.value;if(!scs){scs=true;startSc()}draw()}});
  w.append(ta);
  if(scs&&!ok)w.append(el("div",{style:"font-size:12px;color:#ef4444;margin-top:8px"},"Cần thêm "+(mn-wc)+" từ nữa"));
  w.append(el("button",{class:"btn btn-primary",style:"margin-top:12px",disabled:!ok||!scs,onClick:subSc},!scs?"GÕ ĐỂ BẮT ĐẦU":!ok?`CẦN TỐI THIỂU ${mn} TỪ`:"NỘP BÀI"));
  setTimeout(()=>{const e=document.getElementById("sci");if(e){e.focus();e.setSelectionRange(e.value.length,e.value.length)}},50);
}
function startSc(){clearInterval(tsc);tsc=setInterval(()=>{sctl--;if(sctl<=0){clearInterval(tsc);subSc()}else draw()},1000)}
function subSc(){
  clearInterval(tsc);const scs2=S.rd===2?R2:R3,sc=scs2[S.si];
  const wc=sci.trim().split(/\s+/).filter(Boolean).length,tu=sc.tl-sctl;
  fbSave("round"+S.rd,S.nm,{answer:sci,wordCount:wc,timeUsed:tu,timeLimit:sc.tl});
  if(S.si<scs2.length-1){S.si++;sci="";scs=false;sctl=0;draw()}
  else{sci="";scs=false;sctl=0;S.done=true;draw()}
}

// === LEADERBOARD ===
function drawBoard(){
  const w=el("div",{class:"fade"});w.append(bk());
  w.innerHTML+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px"><div style="font-size:24px">🏆</div><div><div style="font-size:20px;font-weight:900">Bảng xếp hạng</div><div style="font-size:12px;color:#6b6b8a">Kết quả tất cả các vòng</div></div></div>`;
  w.append(tabs(["round1","round2","round3"],["Vòng 1","Vòng 2","Vòng 3"]));
  const rd=parseInt(S.tab.slice(-1)),data=[...S.res["round"+rd]||[]];
  data.sort((a,b)=>rd===1?(b.score||0)-(a.score||0):(b.judgeScore??-1)-(a.judgeScore??-1));
  if(!data.length){w.innerHTML+='<div style="text-align:center;color:#6b6b8a;padding:32px">Chưa có kết quả</div>';app.append(w);return}
  const ms=["🥇","🥈","🥉"];
  data.forEach((e,i)=>{
    const top=i<3,bc=i===0?"rgba(245,158,11,.5)":i===1?"rgba(192,192,192,.4)":i===2?"rgba(205,127,50,.4)":"#2a2a3a";
    const ds=rd===1?e.score:(e.judgeScore??null),dl=rd===1?"điểm":e.judgeScore!=null?"GK chấm":"chưa chấm";
    const sc2=i===0?"#f59e0b":i===1?"#c0c0c0":i===2?"#cd7f32":"#fff";
    const row=el("div",{style:`background:${top?"rgba(245,158,11,.04)":"rgba(255,255,255,.02)"};border:1px solid ${bc};border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px`});
    row.append(el("div",{style:"font-size:22px;width:32px;text-align:center"},top?ms[i]:el("span",{style:"font-size:13px;color:#6b6b8a"},String(i+1))));
    const info=el("div",{style:"flex:1"});
    info.append(el("div",{style:"font-weight:700;color:#fff;font-size:14px"},e.name));
    const bdg=el("div",{style:"display:flex;gap:6px;margin-top:6px;flex-wrap:wrap"});
    if(rd===1){bdg.append(el("span",{class:"badge bg-blue"},"⚡ "+e.wpm+" WPM"));bdg.append(el("span",{class:"badge bg-green"},"🎯 "+e.accuracy+"%"));bdg.append(el("span",{class:"badge",style:"background:rgba(255,255,255,.04);color:#6b6b8a"},"⏱ "+e.timeSeconds+"s"))}
    else{bdg.append(el("span",{class:"badge bg-blue"},"✏️ "+(e.wordCount||"—")+" từ"));bdg.append(el("span",{class:"badge bg-green"},"⏱ "+(e.timeUsed||"—")+"s"))}
    info.append(bdg);row.append(info);
    const sd=el("div",{style:"text-align:right;margin-left:8px"});
    sd.append(el("div",{style:`font-weight:900;font-size:24px;color:${ds!=null?sc2:"rgba(255,255,255,.12)"}`},ds!=null?String(ds):"—"));
    sd.append(el("div",{style:`font-size:11px;color:${ds!=null?"rgba(255,255,255,.4)":"rgba(239,68,68,.6)"}`},dl));
    row.append(sd);w.append(row);
  });
  app.append(w);
}

// === JUDGE ===
function drawJudge(){
  const w=el("div",{class:"fade"});w.append(bk());
  w.innerHTML+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px"><div style="font-size:24px">📋</div><div><div style="font-size:20px;font-weight:900">Bảng chấm điểm</div><div style="font-size:12px;color:#6b6b8a">Giám khảo chấm điểm vòng 2 & 3</div></div></div>`;
  if(S.tab!=="round2"&&S.tab!=="round3")S.tab="round2";
  w.append(tabs(["round2","round3"],["Vòng 2","Vòng 3"]));
  const rd=S.tab==="round2"?2:3,data=S.res["round"+rd]||[];
  if(!data.length){w.innerHTML+='<div style="text-align:center;color:#6b6b8a;padding:32px">Chưa có bài nộp</div>';app.append(w);return}
  data.forEach((e,idx)=>{
    const card=el("div",{class:"card"});
    card.innerHTML=`<div style="padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:rgba(255,255,255,.03)"><div style="font-weight:900;color:#fff;font-size:15px">${esc(e.name)}</div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="badge bg-blue">✏️ ${e.wordCount||"—"} từ</span><span class="badge bg-green">⏱ ${e.timeUsed||"—"}s</span>${e.judgeScore!=null?`<span class="badge bg-amber">🏆 ${e.judgeScore} điểm</span>`:""}</div></div>`;
    const ans=el("div",{style:"padding:12px 16px"});
    ans.innerHTML=`<div style="font-size:11px;color:#6b6b8a;font-weight:700;margin-bottom:6px">CÂU TRẢ LỜI</div>`;
    const ab=el("div",{style:"background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;font-size:14px;line-height:1.7;white-space:pre-wrap;max-height:200px;overflow-y:auto;color:rgba(255,255,255,.85)"});
    ab.textContent=e.answer||"(Trống)";ans.append(ab);card.append(ans);
    const sc=el("div",{style:"padding:0 16px 14px"});
    const sr=el("div",{style:"display:flex;align-items:center;gap:8px"});
    sr.append(el("div",{style:"font-size:12px;color:#6b6b8a;font-weight:700;white-space:nowrap"},"Giám khảo chấm:"));
    const si=el("input",{type:"number",class:"input",min:"0",max:"100",value:e.judgeScore??"",placeholder:"0-100",id:"j"+idx,style:"width:70px;padding:8px;font-size:13px;border-radius:8px"});
    sr.append(si);sr.append(el("span",{style:"font-size:12px;color:#6b6b8a"},"/100"));
    sr.append(el("button",{class:"btn btn-primary",style:"width:auto;padding:8px 16px;font-size:12px;margin-left:auto",onClick:()=>{
      const v=parseInt(document.getElementById("j"+idx).value);
      if(v>=0&&v<=100)fbSave("round"+rd,e.name,{...e,judgeScore:v});
    }},"LƯU"));
    sc.append(sr);card.append(sc);w.append(card);
  });
  app.append(w);
}

// === REVIEW ===
function drawReview(){
  const w=el("div",{class:"fade"});w.append(bk());
  w.innerHTML+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:24px"><div style="font-size:24px">🔍</div><div><div style="font-size:20px;font-weight:900">Xem lại bài thi</div><div style="font-size:12px;color:#6b6b8a">Chiếu lên TV để cả team phân tích</div></div></div>`;
  if(S.tab!=="round2"&&S.tab!=="round3")S.tab="round2";
  w.append(tabs(["round2","round3"],["Vòng 2","Vòng 3"]));
  const rd=S.tab==="round2"?2:3,data=S.res["round"+rd]||[],scs2=rd===2?R2:R3;
  if(!data.length){w.innerHTML+='<div style="text-align:center;color:#6b6b8a;padding:32px">Chưa có bài nộp</div>';app.append(w);return}
  data.forEach(e=>{
    const card=el("div",{class:"card",style:"margin-bottom:20px"});
    card.innerHTML=`<div style="padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:rgba(255,255,255,.03)"><div style="font-weight:900;color:#fff;font-size:16px">${esc(e.name)}</div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="badge bg-blue">✏️ ${e.wordCount||"—"} từ</span><span class="badge bg-green">⏱ ${e.timeUsed||"—"}s / ${e.timeLimit||"—"}s</span>${e.judgeScore!=null?`<span class="badge bg-amber">🏆 GK: ${e.judgeScore}</span>`:""}</div></div>`;
    card.innerHTML+=`<div style="padding:8px 16px;background:rgba(245,158,11,.03)"><div style="font-size:10px;color:rgba(245,158,11,.5);font-weight:700;margin-bottom:2px">ĐỀ BÀI</div><div style="font-size:12px;color:#6b6b8a">${esc(scs2[0]?.s||"")}</div></div>`;
    const ans=el("div",{style:"padding:12px 16px"});
    ans.innerHTML=`<div style="font-size:11px;color:#6366f1;font-weight:700;margin-bottom:8px">CÂU TRẢ LỜI</div>`;
    const ab=el("div",{style:"background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px;font-size:14px;line-height:1.7;color:rgba(255,255,255,.9);white-space:pre-wrap"});
    ab.textContent=e.answer||"(Không có nội dung)";ans.append(ab);card.append(ans);
    card.innerHTML+=`<div style="padding:0 16px 12px"><div style="font-size:11px;color:#6b6b8a;padding:8px;background:rgba(255,255,255,.02);border-radius:6px"><b>Tiêu chí:</b> ${esc(scs2[0]?.c||"")}</div></div>`;
    w.append(card);
  });
  app.append(w);
}

// === ADMIN ===
function drawAdmin(){
  const w=el("div",{class:"fade"});w.append(bk());
  w.innerHTML+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:32px"><div style="font-size:24px">⚙️</div><div><div style="font-size:20px;font-weight:900">Ban tổ chức</div></div></div>`;
  const stats=el("div",{class:"card",style:"padding:20px;margin-bottom:16px"});
  stats.innerHTML=`<div style="font-weight:900;color:#fff;font-size:14px;margin-bottom:12px">Thống kê</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">${[1,2,3].map(r=>`<div style="text-align:center;padding:12px;background:rgba(0,0,0,.3);border-radius:10px"><div style="font-size:22px;font-weight:900;color:#f59e0b">${(S.res["round"+r]||[]).length}</div><div style="font-size:12px;color:#6b6b8a">Vòng ${r}</div></div>`).join("")}</div>`;
  w.append(stats);
  const rules=el("div",{class:"card",style:"padding:20px;margin-bottom:16px"});
  rules.innerHTML=`<div style="font-weight:900;color:#fff;font-size:14px;margin-bottom:8px">Luật thi</div><div style="font-size:12px;color:#6b6b8a;line-height:1.8"><div><b style="color:#fff">Vòng 1:</b> Gõ lại 3 đoạn mẫu. Điểm = WPM × Chính xác. Top 6 vào vòng 2.</div><div><b style="color:#fff">Vòng 2:</b> 3 tình huống, tối thiểu 60 từ. GK chấm điểm.</div><div><b style="color:#fff">Vòng 3:</b> 3 tình huống khó, tối thiểu 100 từ. GK chấm điểm.</div></div>`;
  w.append(rules);
  const prizes=el("div",{class:"card",style:"padding:20px;margin-bottom:16px"});
  prizes.innerHTML=`<div style="font-weight:900;color:#fff;font-size:14px;margin-bottom:8px">Giải thưởng</div><div style="font-size:12px;color:#6b6b8a;line-height:2">🥇 Nhất: 1.000.000đ<br>🥈 Nhì: 500.000đ<br>🥉 Ba: 300.000đ<br>⭐ Tiến bộ nhất: 200.000đ</div>`;
  w.append(prizes);
  w.append(el("button",{class:"btn btn-danger",style:"margin-top:8px",onClick:()=>{if(confirm("Xóa TOÀN BỘ kết quả?"))fbReset()}},"XÓA TOÀN BỘ KẾT QUẢ"));
  app.append(w);
}

S.tab="round1";draw();
</script>
