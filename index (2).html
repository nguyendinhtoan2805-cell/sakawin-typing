<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakawin Speed Typing Challenge</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:#0a0a0f;color:#e4e4ef;min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:16px}
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:12px;transition:all .2s;font-size:14px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;padding:14px 24px;width:100%}
.btn-danger{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.3);padding:14px 24px;width:100%}
.btn-outline{background:rgba(255,255,255,.04);color:#6b6b8a;border:1px solid #2a2a3a;padding:10px 16px;width:100%}
.inp{background:rgba(255,255,255,.05);border:1px solid #2a2a3a;border-radius:12px;padding:14px;color:#fff;font-family:inherit;font-size:15px;width:100%;text-align:center;font-weight:600;outline:none}
.inp:focus{border-color:rgba(245,158,11,.5)}
textarea.inp{text-align:left;font-weight:400;resize:vertical;min-height:100px;font-size:14px;line-height:1.6}
.card{background:#1a1a28;border:1px solid #2a2a3a;border-radius:16px;overflow:hidden;margin-bottom:16px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700}
.bg-blue{background:rgba(96,165,250,.12);color:#60a5fa}
.bg-green{background:rgba(16,185,129,.12);color:#10b981}
.bg-amber{background:rgba(245,158,11,.15);color:#f59e0b}
.bar{height:5px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;width:100%}
.bar-fill{height:100%;border-radius:99px;transition:width .3s}
.tab-bar{display:flex;gap:8px;margin-bottom:24px}
.tab{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;background:rgba(255,255,255,.04);color:#6b6b8a}
.tab.on{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
.home-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.menu-btn{width:100%;display:flex;align-items:center;gap:16px;background:rgba(255,255,255,.025);border:1px solid #2a2a3a;border-radius:14px;padding:16px 20px;text-align:left;cursor:pointer;font-family:inherit;color:#e4e4ef;transition:all .2s}
.menu-btn:hover{transform:scale(1.02)}
.char-ok{color:#10b981}.char-err{color:#ef4444;background:rgba(239,68,68,.12);border-radius:2px}.char-cur{color:#fff;background:rgba(245,158,11,.4);border-radius:2px}.char-wait{color:rgba(255,255,255,.2)}
.textdisplay{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;margin-bottom:12px;max-height:220px;overflow-y:auto;font-family:'Be Vietnam Pro',sans-serif;font-size:15px;line-height:2;word-wrap:break-word;overflow-wrap:break-word;white-space:pre-wrap}
.answer-box{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;font-size:14px;line-height:1.7;white-space:pre-wrap;max-height:200px;overflow-y:auto;color:rgba(255,255,255,.85)}
</style>
</head>
<body>
<div id="app" class="container"></div>
<script>
// === FIREBASE ===
firebase.initializeApp({databaseURL:"https://go---phim---sakawin-default-rtdb.asia-southeast1.firebasedatabase.app"});
const db=firebase.database(),dbRef=db.ref("contest"),editRef=db.ref("questions");
function fbSave(round,name,data){const k=name.replace(/[.#$\[\]\/]/g,"_");return dbRef.child(round).child(k).set({...data,name})}
function fbReset(){return dbRef.remove()}

// === DEFAULT DATA ===
const DEF_R1=[
{t:"Kịch bản chào hỏi & xin SĐT",x:"Dạ chào anh/chị ạ! Em là tư vấn viên bên Sakawin - chuyên bàn học thông minh chống gù chống cận cho bé ạ. Anh/chị đang tìm hiểu bàn học cho bé nhà mình đúng không ạ? Cho em hỏi bé nhà mình năm nay bao nhiêu tuổi và cao khoảng bao nhiêu để em tư vấn dòng phù hợp nhất ạ? Tiện em xin số điện thoại hoặc Zalo để em gửi catalogue ảnh thực tế các mẫu bàn cho anh/chị xem chi tiết hơn ạ, qua tin nhắn Facebook hình ảnh bị giảm chất lượng nhiều lắm ạ."},
{t:"Kịch bản báo giá & dồn ưu đãi",x:"Combo bàn S110 kết hợp ghế G18 hiện tại giá niêm yết là 5.590.000 đồng ạ. Tuy nhiên hiện tại bên em đang có chương trình ưu đãi đặc biệt qua Facebook, em xin duyệt giá combo cho anh/chị chỉ còn 4.790.000 đồng, tiết kiệm được 800.000 đồng ạ. Ngoài ra anh/chị còn được tặng kèm bộ quà trị giá 600.000 đồng gồm đèn học chống cận, giá đỡ sách và bọc ghế. Free ship toàn quốc và lắp đặt miễn phí tại nhà luôn ạ. Tổng giá trị ưu đãi lên đến 2.200.000 đồng, chỉ áp dụng khi mua qua Facebook thôi ạ."}
];
const DEF_R2=[
{t:"Tình huống 1",s:'Khách nhắn: "Cho mình hỏi bàn học cho bé 7 tuổi, cao 1m2 thì dùng loại nào? Giá bao nhiêu? Ship Đà Nẵng được không?"',c:"Chào hỏi đúng chuẩn, không báo giá ngay, hỏi thêm nhu cầu, xin SĐT, tư vấn dòng phù hợp, đề cập ship toàn quốc.",tl:180,mw:60},
{t:"Tình huống 2",s:'Khách nhắn: "Mình thấy trên Shopee có bàn tương tự mà rẻ hơn nhiều, sao bên bạn đắt thế?"',c:"Không nói xấu đối thủ, so sánh tổng giá trị ưu đãi FB (2.2-2.9 triệu), nêu USP bảo hành 10 năm + lắp đặt miễn phí.",tl:180,mw:60},
{t:"Tình huống 3",s:'Khách nhắn: "OK mình muốn mua combo bàn S110 + ghế G05. Địa chỉ: 45 Nguyễn Huệ, Quận 1, HCM. COD nhé."',c:"Xác nhận đầy đủ thông tin, upsell phụ kiện/ghế cao hơn, thông báo quy trình giao nội thành.",tl:150,mw:60}
];
const DEF_R3=[
{t:"Chung kết - TH1",s:'Khách nhắn: "Chồng mình bảo mua bàn gỗ bình thường được rồi, không cần bàn thông minh đâu. Đắt mà chưa chắc bé đã ngồi học."',c:"Thấu hiểu tâm lý gia đình, so sánh giá trị dài hạn, chia nhỏ giá/ngày, không push bán quá mức.",tl:200,mw:100},
{t:"Chung kết - TH2",s:'Khách nhắn: "Mình đang xem bên Igrow và Comfy, giá cũng tương đương. Sao mình nên chọn Sakawin?"',c:"Không nói xấu đối thủ, nêu USP riêng Sakawin, đề xuất gửi bảng so sánh, tạo urgency.",tl:200,mw:100},
{t:"Chung kết - TH3",s:'Khách nhắn: "Mình muốn mua nhưng tháng này hết tiền rồi. Tháng sau có còn giá này không?"',c:"Giữ chân khách, tạo urgency nhẹ, đề xuất đặt cọc giữ giá, xin SĐT follow-up.",tl:200,mw:100}
];

// Live questions (can be edited)
let R1=[...DEF_R1],R2=[...DEF_R2],R3=[...DEF_R3];

// Load custom questions from Firebase
editRef.on("value",snap=>{
  const d=snap.val();
  if(d){
    if(d.r1)R1=d.r1;else R1=[...DEF_R1];
    if(d.r2)R2=d.r2;else R2=[...DEF_R2];
    if(d.r3)R3=d.r3;else R3=[...DEF_R3];
  }
});

// === STATE ===
let S={v:"home",nm:"",rd:1,ti:0,si:0,r1s:[],done:false,tab:"round1",res:{round1:[],round2:[],round3:[]}};
let timerInterval=null,startTime=null,timeLeft=0,typedText="";
const app=document.getElementById("app");
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}

dbRef.on("value",snap=>{
  const d=snap.val()||{};
  S.res={round1:d.round1?Object.values(d.round1):[],round2:d.round2?Object.values(d.round2):[],round3:d.round3?Object.values(d.round3):[]};
  if(["board","judge","review","admin"].includes(S.v))render();
});

function go(v){S.v=v;render()}
function render(){
  app.innerHTML="";
  ({home:drawHome,pname:drawPName,play:drawPlay,judge:drawJudge,review:drawReview,board:drawBoard,admin:drawAdmin,edit:drawEdit})[S.v]?.();
}

// === HOME ===
function drawHome(){
  app.innerHTML=`<div class="home-wrap">
    <div style="text-align:center;margin-bottom:48px">
      <div style="font-size:11px;letter-spacing:3px;color:rgba(245,158,11,.5);font-weight:700;margin-bottom:12px">SAKAWIN GLOBAL</div>
      <div style="font-size:32px;font-weight:900;color:#fff">SPEED TYPING</div>
      <div style="font-size:32px;font-weight:900;color:#f59e0b">CHALLENGE</div>
      <div style="color:#6b6b8a;font-size:14px;margin-top:8px">Cuộc thi gõ phím nhanh & chuẩn xác</div>
    </div>
    <div id="menu" style="width:100%;max-width:420px;display:flex;flex-direction:column;gap:12px"></div>
  </div>`;
  const m=document.getElementById("menu");
  [["pname","⌨️","THÍ SINH","Tham gia thi đấu"],["judge","📋","GIÁM KHẢO","Chấm điểm vòng 2 & 3"],["edit","✏️","SỬA ĐỀ BÀI","Chỉnh sửa nội dung thi"],["review","🔍","XEM LẠI BÀI THI","Đọc bài & phân tích"],["board","🏆","BẢNG XẾP HẠNG","Kết quả chung"],["admin","⚙️","BAN TỔ CHỨC","Quản lý cuộc thi"]].forEach(([v,ic,l,d])=>{
    const b=document.createElement("button");b.className="menu-btn";
    b.innerHTML=`<span style="font-size:24px">${ic}</span><div><div style="font-size:14px;font-weight:700">${l}</div><div style="font-size:12px;color:#6b6b8a">${d}</div></div>`;
    b.onclick=()=>go(v);m.append(b);
  });
}

// === PLAYER NAME ===
function drawPName(){
  app.innerHTML=`<div class="home-wrap"><div style="width:100%;max-width:420px">
    <button id="bk" style="background:none;border:none;color:#6b6b8a;font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:20px">← Quay lại</button>
    <div style="text-align:center;margin-bottom:32px"><div style="font-size:24px;margin-bottom:8px">⌨️</div><div style="font-size:20px;font-weight:900;color:#fff">Nhập tên thí sinh</div></div>
    <input class="inp" id="nminp" placeholder="Họ tên..." value="${esc(S.nm)}">
    <div style="margin:16px 0"><div style="font-size:12px;color:#6b6b8a;text-align:center;margin-bottom:8px">Chọn vòng:</div><div class="tab-bar" id="rdtabs"></div></div>
    <button class="btn btn-primary" id="startbtn">BẮT ĐẦU THI</button>
  </div></div>`;
  document.getElementById("bk").onclick=()=>go("home");
  document.getElementById("nminp").oninput=e=>S.nm=e.target.value;
  const tabs=document.getElementById("rdtabs");
  [1,2,3].forEach(r=>{const b=document.createElement("button");b.className="tab"+(S.rd===r?" on":"");b.textContent="Vòng "+r;b.onclick=()=>{S.rd=r;drawPName()};tabs.append(b)});
  document.getElementById("startbtn").onclick=()=>{
    if(!S.nm.trim())return;
    S.ti=0;S.si=0;S.r1s=[];S.done=false;typedText="";startTime=null;timeLeft=0;clearInterval(timerInterval);
    go("play");
  };
}

// === PLAYER ===
function drawPlay(){
  if(S.done){
    app.innerHTML=`<div style="text-align:center;padding:80px 0">
      <div style="font-size:48px;margin-bottom:16px">🎉</div>
      <div style="font-size:20px;font-weight:900;color:#fff;margin-bottom:8px">Hoàn thành vòng ${S.rd}!</div>
      <div style="color:#6b6b8a;font-size:14px;margin-bottom:32px">Kết quả đã ghi nhận vào bảng xếp hạng</div>
      <button class="btn btn-primary" id="homebtn" style="max-width:300px;margin:0 auto">VỀ TRANG CHỦ</button>
    </div>`;
    document.getElementById("homebtn").onclick=()=>go("home");
    return;
  }
  if(S.rd===1)drawR1();else drawSc();
}

// ============ ROUND 1 ============
function drawR1(){
  const txt=R1[S.ti].x;
  if(!timeLeft)timeLeft=300;
  app.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <div><div style="font-size:11px;color:rgba(245,158,11,.5);font-weight:700;letter-spacing:1px">VÒNG 1</div><div style="font-weight:900;color:#fff;font-size:16px">${esc(S.nm)}</div></div>
      <div class="badge" style="background:rgba(255,255,255,.05);color:#6b6b8a">${S.ti+1}/${R1.length}</div>
    </div>
    <div style="font-size:13px;font-weight:700;color:#6b6b8a;margin-bottom:12px">${esc(R1[S.ti].t)}</div>
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
      <span id="timer" style="font-family:monospace;font-weight:700;color:#10b981"></span>
      <span id="status" style="color:#6b6b8a">Gõ để bắt đầu</span>
    </div>
    <div class="bar" style="margin-bottom:12px"><div id="timerbar" class="bar-fill" style="width:100%;background:#10b981"></div></div>
    <div id="display" class="textdisplay"></div>
    <textarea class="inp" id="typeinput" placeholder="Bắt đầu gõ tại đây..." style="font-size:15px;min-height:140px;line-height:1.8"></textarea>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
      <span id="charcount" style="font-size:12px;color:#6b6b8a">0/${txt.length} ký tự</span>
      <button class="btn btn-primary" id="submitr1" style="width:auto;padding:10px 24px" disabled>NỘP BÀI</button>
    </div>`;
  updateR1Display();updateR1Timer();
  const input=document.getElementById("typeinput");input.focus();
  input.addEventListener("input",function(){
    typedText=this.value;
    if(!startTime){startTime=Date.now();document.getElementById("status").textContent="Đang gõ...";timerInterval=setInterval(()=>{timeLeft--;updateR1Timer();if(timeLeft<=0){clearInterval(timerInterval);submitR1()}},1000)}
    updateR1Display();
    document.getElementById("charcount").textContent=typedText.length+"/"+txt.length+" ký tự";
    document.getElementById("submitr1").disabled=!typedText.trim();
    if(typedText.length>=txt.length)submitR1();
  });
  document.getElementById("submitr1").onclick=submitR1;
}

function updateR1Display(){
  const txt=R1[S.ti].x,d=document.getElementById("display");
  if(!d)return;
  let html="";
  for(let i=0;i<txt.length;i++){
    const ch=txt[i];
    if(i<typedText.length)html+=`<span class="${typedText[i]===ch?"char-ok":"char-err"}">${esc(ch)}</span>`;
    else if(i===typedText.length)html+=`<span class="char-cur">${esc(ch)}</span>`;
    else html+=`<span class="char-wait">${esc(ch)}</span>`;
  }
  d.innerHTML=html;
}

function updateR1Timer(){
  const t=document.getElementById("timer"),b=document.getElementById("timerbar");if(!t||!b)return;
  const c=timeLeft<=30?"#ef4444":timeLeft<=60?"#f59e0b":"#10b981";
  t.style.color=c;t.textContent="⏱ "+Math.floor(timeLeft/60)+":"+String(timeLeft%60).padStart(2,"0");
  b.style.width=(timeLeft/300*100)+"%";b.style.background=c;
}

function submitR1(){
  clearInterval(timerInterval);const txt=R1[S.ti].x;
  const elapsed=(Date.now()-startTime)/1000/60,words=txt.split(/\s+/).length,ratio=Math.min(typedText.length/txt.length,1);
  const wpm=Math.round(Math.round(words*ratio)/Math.max(elapsed,.01));
  let cor=0;for(let i=0;i<Math.min(typedText.length,txt.length);i++)if(typedText[i]===txt[i])cor++;
  const acc=Math.round(cor/txt.length*10000)/100;
  S.r1s.push({wpm,accuracy:acc,score:Math.round(wpm*(acc/100)),timeSeconds:Math.round(elapsed*60)});
  if(S.ti<R1.length-1){S.ti++;typedText="";startTime=null;timeLeft=300;drawR1()}
  else{
    const ns=S.r1s,aw=Math.round(ns.reduce((s,x)=>s+x.wpm,0)/ns.length),aa=Math.round(ns.reduce((s,x)=>s+x.accuracy,0)/ns.length*100)/100;
    fbSave("round1",S.nm,{wpm:aw,accuracy:aa,score:Math.round(aw*(aa/100)),timeSeconds:ns.reduce((s,x)=>s+x.timeSeconds,0)});
    typedText="";startTime=null;timeLeft=0;S.done=true;drawPlay();
  }
}

// ============ ROUND 2/3 ============
function drawSc(){
  const scs=S.rd===2?R2:R3,sc=scs[S.si];
  if(!timeLeft)timeLeft=sc.tl;typedText="";startTime=null;
  app.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <div><div style="font-size:11px;color:rgba(245,158,11,.5);font-weight:700;letter-spacing:1px">VÒNG ${S.rd}</div><div style="font-weight:900;color:#fff;font-size:16px">${esc(S.nm)}</div></div>
      <div class="badge" style="background:rgba(255,255,255,.05);color:#6b6b8a">TH ${S.si+1}/${scs.length}</div>
    </div>
    <div style="font-size:13px;font-weight:700;color:#6b6b8a;margin-bottom:12px">${esc(sc.t)}</div>
    <div style="background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:12px;padding:14px;margin-bottom:12px">
      <div style="font-size:10px;color:rgba(245,158,11,.5);font-weight:700;letter-spacing:.5px;margin-bottom:4px">TÌNH HUỐNG</div>
      <div style="color:#fff;font-size:14px;line-height:1.6">${esc(sc.s)}</div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
      <span id="sctimer" style="font-family:monospace;font-weight:700;color:#10b981"></span>
      <span id="scwc" style="font-family:monospace;font-weight:700;color:#ef4444">✏️ 0/${sc.mw} từ</span>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:12px">
      <div class="bar"><div id="sctimerbar" class="bar-fill" style="width:100%;background:#10b981"></div></div>
      <div class="bar"><div id="scwcbar" class="bar-fill" style="width:0%;background:#ef4444"></div></div>
    </div>
    <textarea class="inp" id="scinput" placeholder="Gõ câu trả lời tư vấn cho khách..." style="min-height:180px"></textarea>
    <div id="scwarning" style="font-size:12px;color:#ef4444;margin-top:8px;display:none"></div>
    <button class="btn btn-primary" id="scsubmit" style="margin-top:12px" disabled>GÕ ĐỂ BẮT ĐẦU</button>`;
  updateScTimer();
  const input=document.getElementById("scinput");input.focus();
  input.addEventListener("input",function(){
    typedText=this.value;
    if(!startTime){startTime=Date.now();timerInterval=setInterval(()=>{timeLeft--;updateScTimer();if(timeLeft<=0){clearInterval(timerInterval);submitSc()}},1000)}
    const wc=typedText.trim().split(/\s+/).filter(Boolean).length,ok=wc>=sc.mw;
    const wcc=ok?"#10b981":wc>=sc.mw*.7?"#f59e0b":"#ef4444";
    document.getElementById("scwc").style.color=wcc;
    document.getElementById("scwc").textContent="✏️ "+wc+"/"+sc.mw+" từ "+(ok?"✓":"");
    document.getElementById("scwcbar").style.width=Math.min(wc/sc.mw*100,100)+"%";
    document.getElementById("scwcbar").style.background=wcc;
    const warn=document.getElementById("scwarning");
    if(!ok){warn.style.display="block";warn.textContent="Cần thêm "+(sc.mw-wc)+" từ nữa"}else warn.style.display="none";
    const btn=document.getElementById("scsubmit");btn.disabled=!ok;
    btn.textContent=ok?"NỘP BÀI":`CẦN TỐI THIỂU ${sc.mw} TỪ`;
  });
  document.getElementById("scsubmit").onclick=submitSc;
}

function updateScTimer(){
  const scs=S.rd===2?R2:R3,sc=scs[S.si];
  const t=document.getElementById("sctimer"),b=document.getElementById("sctimerbar");if(!t||!b)return;
  const c=timeLeft<=30?"#ef4444":timeLeft<=60?"#f59e0b":"#10b981";
  t.style.color=c;t.textContent="⏱ "+Math.floor(timeLeft/60)+":"+String(timeLeft%60).padStart(2,"0");
  b.style.width=(timeLeft/sc.tl*100)+"%";b.style.background=c;
}

function submitSc(){
  clearInterval(timerInterval);const scs=S.rd===2?R2:R3,sc=scs[S.si];
  const wc=typedText.trim().split(/\s+/).filter(Boolean).length,tu=sc.tl-timeLeft;
  fbSave("round"+S.rd,S.nm,{answer:typedText,wordCount:wc,timeUsed:tu,timeLimit:sc.tl});
  if(S.si<scs.length-1){S.si++;typedText="";startTime=null;timeLeft=0;clearInterval(timerInterval);drawSc()}
  else{typedText="";startTime=null;timeLeft=0;S.done=true;drawPlay()}
}

// ============ EDIT QUESTIONS ============
function drawEdit(){
  let editTab=S.editTab||"r1";
  app.innerHTML=`<div>
    <button id="bk" style="background:none;border:none;color:#6b6b8a;font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:20px">← Quay lại</button>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px"><div style="font-size:24px">✏️</div><div><div style="font-size:20px;font-weight:900">Sửa đề bài</div><div style="font-size:12px;color:#6b6b8a">Chỉnh sửa nội dung thi các vòng</div></div></div>
    <div class="tab-bar" id="etabs"></div>
    <div id="elist"></div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button class="btn btn-primary" id="esave">LƯU THAY ĐỔI</button>
      <button class="btn btn-outline" id="ereset" style="width:auto;padding:14px 20px;white-space:nowrap">KHÔI PHỤC MẶC ĐỊNH</button>
    </div>
    <div id="esaved" style="text-align:center;color:#10b981;font-size:13px;font-weight:700;margin-top:12px;display:none">✓ Đã lưu!</div>
  </div>`;
  document.getElementById("bk").onclick=()=>go("home");
  const tabs=document.getElementById("etabs");
  [["r1","Vòng 1"],["r2","Vòng 2"],["r3","Vòng 3"]].forEach(([k,l])=>{
    const b=document.createElement("button");b.className="tab"+(editTab===k?" on":"");b.textContent=l;
    b.onclick=()=>{S.editTab=k;drawEdit()};tabs.append(b);
  });

  const list=document.getElementById("elist");
  if(editTab==="r1"){
    R1.forEach((q,i)=>{
      list.innerHTML+=`<div class="card" style="padding:16px;margin-bottom:12px">
        <div style="font-size:12px;color:#f59e0b;font-weight:700;margin-bottom:8px">Đoạn ${i+1}: ${esc(q.t)}</div>
        <div style="font-size:11px;color:#6b6b8a;margin-bottom:4px">Tiêu đề:</div>
        <input class="inp" id="r1t${i}" value="${esc(q.t)}" style="text-align:left;font-size:13px;padding:10px;margin-bottom:8px;font-weight:600">
        <div style="font-size:11px;color:#6b6b8a;margin-bottom:4px">Nội dung gõ:</div>
        <textarea class="inp" id="r1x${i}" style="min-height:120px;font-size:13px;padding:10px">${esc(q.x)}</textarea>
      </div>`;
    });
  } else {
    const arr=editTab==="r2"?R2:R3;
    arr.forEach((q,i)=>{
      list.innerHTML+=`<div class="card" style="padding:16px;margin-bottom:12px">
        <div style="font-size:12px;color:#f59e0b;font-weight:700;margin-bottom:8px">${esc(q.t)}</div>
        <div style="font-size:11px;color:#6b6b8a;margin-bottom:4px">Tiêu đề:</div>
        <input class="inp" id="${editTab}t${i}" value="${esc(q.t)}" style="text-align:left;font-size:13px;padding:10px;margin-bottom:8px;font-weight:600">
        <div style="font-size:11px;color:#6b6b8a;margin-bottom:4px">Tình huống:</div>
        <textarea class="inp" id="${editTab}s${i}" style="min-height:80px;font-size:13px;padding:10px">${esc(q.s)}</textarea>
        <div style="font-size:11px;color:#6b6b8a;margin-bottom:4px;margin-top:8px">Tiêu chí chấm:</div>
        <textarea class="inp" id="${editTab}c${i}" style="min-height:60px;font-size:13px;padding:10px">${esc(q.c)}</textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <div style="flex:1"><div style="font-size:11px;color:#6b6b8a;margin-bottom:4px">Thời gian (giây):</div><input class="inp" type="number" id="${editTab}tl${i}" value="${q.tl}" style="font-size:13px;padding:10px"></div>
          <div style="flex:1"><div style="font-size:11px;color:#6b6b8a;margin-bottom:4px">Số từ tối thiểu:</div><input class="inp" type="number" id="${editTab}mw${i}" value="${q.mw}" style="font-size:13px;padding:10px"></div>
        </div>
      </div>`;
    });
  }

  document.getElementById("esave").onclick=()=>{
    if(editTab==="r1"){
      const newR1=R1.map((q,i)=>({t:document.getElementById("r1t"+i).value,x:document.getElementById("r1x"+i).value}));
      editRef.child("r1").set(newR1);R1.splice(0,R1.length,...newR1);
    }else{
      const arr=editTab==="r2"?R2:R3,key=editTab;
      const newArr=arr.map((q,i)=>({t:document.getElementById(key+"t"+i).value,s:document.getElementById(key+"s"+i).value,c:document.getElementById(key+"c"+i).value,tl:parseInt(document.getElementById(key+"tl"+i).value)||180,mw:parseInt(document.getElementById(key+"mw"+i).value)||60}));
      editRef.child(key).set(newArr);arr.splice(0,arr.length,...newArr);
    }
    const msg=document.getElementById("esaved");msg.style.display="block";setTimeout(()=>msg.style.display="none",2000);
  };

  document.getElementById("ereset").onclick=()=>{
    if(!confirm("Khôi phục đề bài mặc định?"))return;
    if(editTab==="r1"){editRef.child("r1").remove();R1.splice(0,R1.length,...DEF_R1)}
    else if(editTab==="r2"){editRef.child("r2").remove();R2.splice(0,R2.length,...DEF_R2)}
    else{editRef.child("r3").remove();R3.splice(0,R3.length,...DEF_R3)}
    drawEdit();
  };
}

// ============ LEADERBOARD ============
function drawBoard(){
  app.innerHTML=`<div>
    <button id="bk" style="background:none;border:none;color:#6b6b8a;font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:20px">← Quay lại</button>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px"><div style="font-size:24px">🏆</div><div><div style="font-size:20px;font-weight:900">Bảng xếp hạng</div><div style="font-size:12px;color:#6b6b8a">Kết quả tất cả các vòng</div></div></div>
    <div class="tab-bar" id="btabs"></div><div id="blist"></div>
  </div>`;
  document.getElementById("bk").onclick=()=>go("home");
  const tabs=document.getElementById("btabs");
  ["round1","round2","round3"].forEach((k,i)=>{const b=document.createElement("button");b.className="tab"+(S.tab===k?" on":"");b.textContent="Vòng "+(i+1);b.onclick=()=>{S.tab=k;drawBoard()};tabs.append(b)});
  const rd=parseInt(S.tab.slice(-1)),data=[...S.res["round"+rd]||[]];
  data.sort((a,b)=>rd===1?(b.score||0)-(a.score||0):(b.judgeScore??-1)-(a.judgeScore??-1));
  const list=document.getElementById("blist");
  if(!data.length){list.innerHTML='<div style="text-align:center;color:#6b6b8a;padding:32px">Chưa có kết quả</div>';return}
  const ms=["🥇","🥈","🥉"];
  data.forEach((e,i)=>{
    const top=i<3,bc=i===0?"rgba(245,158,11,.5)":i===1?"rgba(192,192,192,.4)":i===2?"rgba(205,127,50,.4)":"#2a2a3a";
    const ds=rd===1?e.score:(e.judgeScore??null),dl=rd===1?"điểm":e.judgeScore!=null?"GK chấm":"chưa chấm";
    const sc=i===0?"#f59e0b":i===1?"#c0c0c0":i===2?"#cd7f32":"#fff";
    const badges=rd===1?`<span class="badge bg-blue">⚡ ${e.wpm} WPM</span><span class="badge bg-green">🎯 ${e.accuracy}%</span><span class="badge" style="background:rgba(255,255,255,.04);color:#6b6b8a">⏱ ${e.timeSeconds}s</span>`:`<span class="badge bg-blue">✏️ ${e.wordCount||"—"} từ</span><span class="badge bg-green">⏱ ${e.timeUsed||"—"}s</span>`;
    list.innerHTML+=`<div style="background:${top?"rgba(245,158,11,.04)":"rgba(255,255,255,.02)"};border:1px solid ${bc};border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <div style="font-size:22px;width:32px;text-align:center">${top?ms[i]:`<span style="font-size:13px;color:#6b6b8a">${i+1}</span>`}</div>
      <div style="flex:1"><div style="font-weight:700;color:#fff;font-size:14px">${esc(e.name)}</div><div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">${badges}</div></div>
      <div style="text-align:right"><div style="font-weight:900;font-size:24px;color:${ds!=null?sc:"rgba(255,255,255,.12)"}">${ds!=null?ds:"—"}</div><div style="font-size:11px;color:${ds!=null?"rgba(255,255,255,.4)":"rgba(239,68,68,.6)"}">${dl}</div></div>
    </div>`;
  });
}

// ============ JUDGE ============
function drawJudge(){
  if(S.tab!=="round2"&&S.tab!=="round3")S.tab="round2";
  const rd=S.tab==="round2"?2:3,data=S.res["round"+rd]||[];
  app.innerHTML=`<div>
    <button id="bk" style="background:none;border:none;color:#6b6b8a;font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:20px">← Quay lại</button>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px"><div style="font-size:24px">📋</div><div><div style="font-size:20px;font-weight:900">Bảng chấm điểm</div><div style="font-size:12px;color:#6b6b8a">Giám khảo chấm điểm vòng 2 & 3</div></div></div>
    <div class="tab-bar" id="jtabs"></div><div id="jlist"></div>
  </div>`;
  document.getElementById("bk").onclick=()=>go("home");
  const tabs=document.getElementById("jtabs");
  ["round2","round3"].forEach((k,i)=>{const b=document.createElement("button");b.className="tab"+(S.tab===k?" on":"");b.textContent="Vòng "+(i+2);b.onclick=()=>{S.tab=k;drawJudge()};tabs.append(b)});
  const list=document.getElementById("jlist");
  if(!data.length){list.innerHTML='<div style="text-align:center;color:#6b6b8a;padding:32px">Chưa có bài nộp</div>';return}
  data.forEach((e,idx)=>{
    list.innerHTML+=`<div class="card">
      <div style="padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:rgba(255,255,255,.03)">
        <div style="font-weight:900;color:#fff;font-size:15px">${esc(e.name)}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap"><span class="badge bg-blue">✏️ ${e.wordCount||"—"} từ</span><span class="badge bg-green">⏱ ${e.timeUsed||"—"}s</span>${e.judgeScore!=null?`<span class="badge bg-amber">🏆 ${e.judgeScore} điểm</span>`:""}</div>
      </div>
      <div style="padding:12px 16px"><div style="font-size:11px;color:#6b6b8a;font-weight:700;margin-bottom:6px">CÂU TRẢ LỜI</div><div class="answer-box">${esc(e.answer||"(Trống)")}</div></div>
      <div style="padding:0 16px 14px"><div style="display:flex;align-items:center;gap:8px">
        <div style="font-size:12px;color:#6b6b8a;font-weight:700;white-space:nowrap">Giám khảo chấm:</div>
        <input type="number" class="inp" id="jin${idx}" min="0" max="100" value="${e.judgeScore??""}" placeholder="0-100" style="width:70px;padding:8px;font-size:13px;border-radius:8px">
        <span style="font-size:12px;color:#6b6b8a">/100</span>
        <button class="btn btn-primary" id="jsave${idx}" style="width:auto;padding:8px 16px;font-size:12px;margin-left:auto">LƯU</button>
      </div></div>
    </div>`;
    setTimeout(()=>{document.getElementById("jsave"+idx).onclick=()=>{const v=parseInt(document.getElementById("jin"+idx).value);if(v>=0&&v<=100)fbSave("round"+rd,e.name,{...e,judgeScore:v})}},0);
  });
}

  data.forEach(e=>{
